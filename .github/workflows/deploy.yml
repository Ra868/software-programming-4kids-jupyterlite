name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deployment runs at a time; a new push cancels the in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Cleanup unwanted files
        run: |
          echo "Removing .txt and .rtf files..."
          find . -type f \( -name '*.txt' -o -name '*.rtf' \) ! -path './.git/*' -delete
          echo "Cleanup complete"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install JupyterLite and dependencies
        run: |
          pip install --upgrade pip
          pip install jupyterlite-core jupyterlite-pyodide-kernel

      - name: Build JupyterLite
        run: jupyter lite build --config jupyter_lite_config.json --output-dir _output

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
