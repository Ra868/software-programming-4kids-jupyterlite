name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: List files before cleanup
        run: ls -la

      - name: Cleanup unwanted files
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing all .txt files:"
          find . -name "*.txt" -type f
          echo "Listing all .rtf files:"
          find . -name "*.rtf" -type f
          echo "Removing .txt and .rtf files..."
          find . -type f -name "*.txt" -delete
          find . -type f -name "*.rtf" -delete
          echo "Cleanup complete. Verifying:"
          find . -name "*.txt" -type f || echo "No .txt files found"
          find . -name "*.rtf" -type f || echo "No .rtf files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JupyterLite and dependencies
        run: |
          pip install --upgrade pip
          pip install jupyterlite-core jupyterlite-pyodide-kernel

      - name: Build JupyterLite
        run: jupyter lite build --config jupyter_lite_config.json --output-dir _output

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
