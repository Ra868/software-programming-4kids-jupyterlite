name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Cleanup unwanted files
        run: |
          echo "Removing .txt and .rtf files..."
          find . -type f -name "*.txt" -delete
          find . -type f -name "*.rtf" -delete
          echo "Cleanup complete"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JupyterLite and dependencies
        run: |
          pip install --upgrade pip
          pip install jupyterlite-core jupyterlite-pyodide-kernel jupyter-server

      - name: Prepare notebooks directory
        run: |
          echo "Creating notebooks directory..."
          mkdir -p notebooks
          if [ -d "content" ]; then
            cp -r content/. notebooks/
            echo "Notebooks copied successfully"
          fi

      - name: Build JupyterLite
       run: jupyter lite build --config jupyter_lite_config.json --contents content/ --output-dir _output

      - name: Copy content to output
        run: |
          echo "Copying content folder to output..."
          if [ -d "content" ]; then
            cp -r content _output/files/
            echo "Content copied successfully"
            ls -la _output/files/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
