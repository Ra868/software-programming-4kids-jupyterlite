name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Cleanup unwanted files
        run: |
          echo "Removing .txt and .rtf files..."
          find . -type f -name "*.txt" -delete
          find . -type f -name "*.rtf" -delete
          echo "Cleanup complete"

      - name: Prepare content for JupyterLite build
        run: |
          echo "Preparing notebooks from content/ directory..."
          if [ -d "content" ]; then
            echo "Content directory exists, copying structure..."
            # Copy entire content directory to notebooks
            cp -r content notebooks
            echo "Content copied successfully"
            echo "Directory structure:"
            find notebooks -type f -name "*.ipynb" | head -20
          else
            echo "Warning: content directory not found"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JupyterLite and dependencies
        run: |
          pip install --upgrade pip
          pip install jupyterlite-core jupyterlite-pyodide-kernel jupyter-server

      - name: Build JupyterLite
        run: jupyter lite build --config jupyter_lite_config.json --output-dir _output

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
